plugins {
	id 'groovy'
}

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

repositories {
	mavenCentral()
}

def spockVersion = '2.4-groovy-5.0'
def groovyVersion = '5.0.4'
def testcontainersVersion = '2.0.4'
def playwrightVersion = '1.42.0'

dependencies {
	testImplementation "org.apache.groovy:groovy:${groovyVersion}"
	testImplementation "org.apache.groovy:groovy-json:${groovyVersion}"

	testImplementation "org.spockframework:spock-core:${spockVersion}"

	testImplementation "org.testcontainers:testcontainers:${testcontainersVersion}"
	testImplementation "org.testcontainers:testcontainers-spock:${testcontainersVersion}"

	testImplementation "com.microsoft.playwright:playwright:${playwrightVersion}"

	testImplementation 'ch.qos.logback:logback-classic:1.4.14'
	testImplementation 'commons-net:commons-net:3.10.0'
}

test {
	useJUnitPlatform()
	enabled = false
}

tasks.register('integrationTest', Test) {
	useJUnitPlatform()
	testClassesDirs = sourceSets.test.output.classesDirs
	classpath = sourceSets.test.runtimeClasspath

	jvmArgs '-Xms4g', '-Xmx4g'

	testLogging {
		events 'passed', 'skipped', 'failed', 'standardOut', 'standardError'
		showStandardStreams = true
	}

	dependsOn ':modules:test-factory-calculator:jar'
}
