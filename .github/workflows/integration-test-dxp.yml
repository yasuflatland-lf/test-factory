name: Integration Test — DXP

on:
  workflow_dispatch:
  push:
    branches: [feature/adopt_dxp]

jobs:
  integration-test-dxp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write DXP activation key
        env:
          LDF_DXP_ACTIVATION_KEY: ${{ secrets.LDF_DXP_ACTIVATION_KEY }}
        run: printf '%s' "$LDF_DXP_ACTIVATION_KEY" > activation-keys/activation-key.xml

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run DXP integration tests
        run: |
          ./gradlew :modules:liferay-dummy-factory:clean :integration-test:clean
          ./gradlew :integration-test:integrationTest -Pbuild.target=dxp
