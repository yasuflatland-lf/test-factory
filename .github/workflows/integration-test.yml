name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.12.2'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Pull Liferay Docker image
        run: docker pull liferay/dxp:2026.q1.3-lts &

      - name: Install Playwright browsers
        run: npx playwright@1.59.0 install --with-deps chromium

      - name: Wait for Docker image pull
        run: wait

      - name: Run integration tests
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: ./gradlew :integration-test:integrationTest --no-daemon --info

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: integration-test/build/reports/tests/integrationTest/
          retention-days: 14

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: integration-test/build/test-results/integrationTest/
          retention-days: 14
