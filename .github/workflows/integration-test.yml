name: Integration Test

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn via Corepack
        run: corepack enable

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Provision DXP activation key (from base64 secret)
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: |
          if [ -z "${LIFERAY_DXP_LICENSE_BASE64}" ]; then
            echo "::error::LIFERAY_DXP_LICENSE_BASE64 secret is not set"
            exit 1
          fi
          # Gradle's resolveLicenseFile task reads LIFERAY_DXP_LICENSE_BASE64 and decodes it.
          # No pre-decode needed here; passing via env is sufficient.

      - name: Run integration tests
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: |
          ./gradlew :integration-test:integrationTest --no-daemon --info

      - name: Upload integration test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: |
            integration-test/build/reports/tests/
            integration-test/build/reports/jacoco/
